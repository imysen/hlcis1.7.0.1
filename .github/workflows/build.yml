name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag (e.g. v1.0.0)'
        required: false
        type: string
      is_test_mode:
        description: 'Test Mode'
        required: false
        default: false
        type: boolean

env:
  # 自动获取 GitHub NuGet 源地址，并设置统一的 .NET 版本
  GITHUB_NUGET_SOURCE: "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
  DOTNET_VERSION: '8.0.x'

jobs:
  # ==========================================
  # 1. 编译主程序 (跨平台矩阵构建)
  # ==========================================
  build_app:
    name: Build App (${{ matrix.os }}, ${{ matrix.arch }}, ${{ matrix.build_type }})
    runs-on: ${{ matrix.os == 'linux' && 'ubuntu-latest' || ( matrix.os == 'macos' && 'macos-latest' || 'windows-latest' ) }}
    strategy:
      matrix:
        os: [windows, linux, macos]
        arch: [x64, arm64]
        build_type: [full, selfContained]
        exclude:
          - os: linux
            build_type: full # Linux 上通常使用 selfContained 更方便
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish App (Standard .NET CLI)
        shell: bash
        run: |
          # 动态计算 RID (Runtime Identifier)
          RID_OS="${{ matrix.os }}"
          [ "$RID_OS" == "macos" ] && RID_OS="osx"
          [ "$RID_OS" == "windows" ] && RID_OS="win"
          RID="${RID_OS}-${{ matrix.arch }}"

          # 计算是否自包含
          SELF_CONTAINED="false"
          [ "${{ matrix.build_type }}" == "selfContained" ] && SELF_CONTAINED="true"

          echo "Publishing for RID: $RID, SelfContained: $SELF_CONTAINED"
          
          # 标准的 dotnet publish 命令
          dotnet publish -c Release -r $RID --self-contained $SELF_CONTAINED -o ./out/app_${{ matrix.os }}_${{ matrix.arch }}_${{ matrix.build_type }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app_${{ matrix.os }}_${{ matrix.arch }}_${{ matrix.build_type }}
          path: ./out/app_${{ matrix.os }}_${{ matrix.arch }}_${{ matrix.build_type }}/*

  # ==========================================
  # 2. 编译 NuGet 包
  # ==========================================
  build_nupkg:
    name: Build NuGet Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Pack NuGet packages
        run: dotnet pack -c Release -o ./out_nupkgs

      - name: Add GitHub Nuget Source
        run: dotnet nuget add source --username ${{ github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "${{ env.GITHUB_NUGET_SOURCE }}"

      - name: Push to GitHub Packages
        if: github.event_name != 'pull_request'
        run: dotnet nuget push "./out_nupkgs/*.nupkg" --source "github" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      - name: Upload Nupkg Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: out_nupkgs
          path: ./out_nupkgs/*.nupkg

  # ==========================================
  # 3. 发布阶段 (GitHub Release & NuGet.org)
  # ==========================================
  publish:
    name: Create Release and Publish
    runs-on: ubuntu-latest
    needs: [build_app, build_nupkg]
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Zip Artifacts for Release
        run: |
          # 将下载好的各平台文件夹打包成 zip，方便用户在 Release 页面下载
          cd artifacts
          for dir in app_*/; do
            if [ -d "$dir" ]; then
              zip -r "${dir%/}.zip" "$dir"
            fi
          done
          cd ..

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./artifacts/*.zip,./artifacts/out_nupkgs/*.nupkg"
          tag: ${{ github.event.inputs.release_tag || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }} # 内置 Token，无需额外配置
          draft: false
          prerelease: ${{ github.event.inputs.is_test_mode == 'true' }}

      - name: Push to NuGet.org
        if: github.event.inputs.is_test_mode != 'true'
        env:
          NUGET_ORG_KEY: ${{ secrets.NUGET_ORG_KEY }}
        run: |
          # Bash 原生判断，避开 GitHub Actions if 块中不能使用 secrets 的限制
          if [ -z "$NUGET_ORG_KEY" ]; then
            echo "未配置 NUGET_ORG_KEY，跳过发布到 NuGet.org。"
            exit 0
          fi
          dotnet nuget push "./artifacts/out_nupkgs/*.nupkg" -k "$NUGET_ORG_KEY" -s https://api.nuget.org/v3/index.json --skip-duplicate
