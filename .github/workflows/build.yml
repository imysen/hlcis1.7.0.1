name: Build Windows x64

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GITHUB_NUGET_SOURCE: "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
  DOTNET_VERSION: '8.0.x'

jobs:
  build_windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          # 必须包含子模块，fetch-depth: 0 确保所有历史和分支可见
          submodules: recursive
          fetch-depth: 0
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      # 强制修复子模块映射（针对 vendors 下项目无法找到的问题）
      - name: Force Update Submodules
        shell: pwsh
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --force

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore and Build
        shell: pwsh
        run: |
          # 检查项目文件是否存在，如果不存在则报错并列出目录结构（方便调试）
          $projectPath = "vendors/EdgeTtsSharp/Edge_tts_sharp/Edge_tts_sharp.csproj"
          if (!(Test-Path $projectPath)) {
              Write-Error "找不到子项目文件: $projectPath"
              ls -R vendors
              exit 1
          }
          dotnet restore ClassIsland.sln

      - name: Publish Windows App
        run: dotnet publish -c Release -r win-x64 --self-contained true -o ./out/app_windows_x64

      - name: Pack and Push NuGet
        shell: pwsh
        run: |
          dotnet pack -c Release -o ./out_nupkgs
          # 动态处理 NuGet 源
          $sourceName = "github_ci"
          if (!(dotnet nuget list source | Select-String $sourceName)) {
              dotnet nuget add source --username ${{ github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name $sourceName "${{ env.GITHUB_NUGET_SOURCE }}"
          }
          dotnet nuget push "./out_nupkgs/*.nupkg" --source $sourceName --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ClassIsland_Windows_x64
          path: ./out/app_windows_x64/*
