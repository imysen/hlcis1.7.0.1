name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag (e.g. v1.0.0)'
        required: true
        type: string
      is_test_mode:
        description: 'Test Mode'
        required: false
        default: false
        type: boolean

env:
  # 自动获取 GitHub NuGet 源地址
  GITHUB_NUGET_SOURCE: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

jobs:
  # 1. 构建主程序
  build_app:
    runs-on: ${{ matrix.os == 'linux' && 'ubuntu-24.04' || ( matrix.os == 'macos' && 'macos-15' || 'windows-2022' ) }}
    strategy:
      matrix:
        build_type: ['full', 'selfContained']
        package: ['folder', 'deb']
        arch: ['x64', 'arm64']
        os: [windows, linux]
        exclude:
          - os: windows
            package: deb
          - os: linux
            build_type: full
        include:
          - os: macos
            package: pkg
            build_type: selfContained
            arch: arm64
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Add GitHub Nuget Source
        run: dotnet nuget add source --username ${{ github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "${{ env.GITHUB_NUGET_SOURCE }}"

      - name: Build & Publish (Nuke/Script)
        shell: pwsh
        run: |
          if ("${{ matrix.os }}" -eq "windows") {
            ./build.ps1 PublishApp --arch ${{ matrix.arch }} --osName ${{ matrix.os }}
          } else {
            chmod +x ./build.sh
            ./build.sh PublishApp
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.package }}
          path: ./out/*

  # 2. 构建 NuGet 包
  build_nupkg:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build Nuget packages
        run: dotnet pack -c Release -o ./out/nupkgs

      - name: Push to GitHub Packages
        if: github.event_name != 'pull_request'
        run: |
          dotnet nuget push ./out/nupkgs/*.nupkg --source "${{ env.GITHUB_NUGET_SOURCE }}" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      - name: Upload Nupkg Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: out_nupkgs
          path: ./out/nupkgs/*.nupkg

  # 3. 发布阶段 (Release)
  publish:
    runs-on: ubuntu-latest
    needs: [build_app, build_nupkg]
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./artifacts/**/*"
          tag: ${{ github.event.inputs.release_tag || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: ${{ github.event.inputs.is_test_mode == 'true' }}

      - name: Push to NuGet.org
        if: github.event.inputs.is_test_mode != 'true' && secrets.NUGET_ORG_KEY != ''
        run: |
          dotnet nuget push "./artifacts/out_nupkgs/*.nupkg" -k ${{ secrets.NUGET_ORG_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate
