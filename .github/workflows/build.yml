name: Build Windows x64

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GITHUB_NUGET_SOURCE: "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
  DOTNET_VERSION: '8.0.x'

jobs:
  build_windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          # 先尝试常规同步
          submodules: recursive
          fetch-depth: 0
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      # 关键步骤：手动修复缺失的子项目
      - name: Fix Missing Dependencies (EdgeTtsSharp)
        shell: pwsh
        run: |
          $vendorDir = "vendors/EdgeTtsSharp"
          if (!(Test-Path "$vendorDir/Edge_tts_sharp/Edge_tts_sharp.csproj")) {
              echo "子项目文件缺失，正在尝试手动克隆..."
              # 如果该项目在 GitHub 上，请把下面的 URL 换成它的真实地址
              # 如果它是私有的，或者就在你的组织下，可以尝试：
              git clone https://github.com/imysen/EdgeTtsSharp.git $vendorDir --recursive
          } else {
              echo "子项目文件已存在，跳过克隆。"
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Dependencies
        run: dotnet restore ClassIsland.sln

      - name: Publish Windows App
        run: dotnet publish -c Release -r win-x64 --self-contained true -o ./out/app_windows_x64

      - name: Pack NuGet
        run: dotnet pack -c Release -o ./out_nupkgs

      - name: Push to GitHub Packages
        shell: pwsh
        run: |
          # 确保不因源已存在而报错
          dotnet nuget add source --username ${{ github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "${{ env.GITHUB_NUGET_SOURCE }}" || echo "Source already exists"
          dotnet nuget push "./out_nupkgs/*.nupkg" --source "github" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ClassIsland_Windows_x64
          path: ./out/app_windows_x64/*
