name: Build ClassIsland

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        arch: [x64, x86, arm64]

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}

      - name: Restore dependencies
        run: dotnet restore ClassIsland.sln

      - name: Build solution
        run: dotnet build ClassIsland.sln --configuration Release --no-restore

      - name: Publish application
        run: |
          dotnet publish ClassIsland/ClassIsland/ClassIsland.csproj `
            -c Release `
            -r win-${{ matrix.arch }} `
            --self-contained true `
            /p:PublishSingleFile=true `
            -o publish/${{ matrix.arch }}

      - name: Zip build
        run: |
          Compress-Archive `
            -Path publish/${{ matrix.arch }}/* `
            -DestinationPath ClassIsland-${{ matrix.arch }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClassIsland-${{ matrix.arch }}
          path: ClassIsland-${{ matrix.arch }}.zip


  release:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch'

    steps:

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          artifacts: "artifacts/**/*.zip"
          draft: false
          token: ${{ secrets.GITHUB_TOKEN }}
