name: Build

on:
  push:
    branches: [ main ]   # 如果你的默认分支是 master，就改成 master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        arch: [x64, x86, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      # 缓存 NuGet，加快构建
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}

      - name: Restore
        run: dotnet restore ClassIsland.sln

      - name: Build
        run: dotnet build ClassIsland.sln --configuration Release --no-restore

      - name: Publish
        run: |
          dotnet publish ClassIsland/ClassIsland/ClassIsland.csproj `
            -c Release `
            -r win-${{ matrix.arch }} `
            --self-contained true `
            /p:PublishSingleFile=true `
            -o publish/${{ matrix.arch }}

      - name: Zip build
        run: |
          Compress-Archive -Path publish/${{ matrix.arch }}/* -DestinationPath ClassIsland-${{ matrix.arch }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: classisland-${{ matrix.arch }}
          path: ClassIsland-${{ matrix.arch }}.zip


  release:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          artifacts: "artifacts/**/*.zip"
          draft: false
          token: ${{ secrets.GITHUB_TOKEN }}
